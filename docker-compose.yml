# JJHo — The Fan Almanac, self-hosted behind the existing Cloudflare tunnel.
#
# - Joins the external `km-tracker_default` network so the `km-tracker` tunnel
#   can route jjho.graham-williams.com -> http://jjho-fan-almanac:8080 by name.
# - NO host port mapping: reachable only over that network; sign-in is gated by
#   the app-level shared password (APP_PASSWORD, from the box's untracked .env).
# - All state lives in the named volume `jjho-data` (re-derivable public data).
services:
  jjho-fan-almanac:
    build: .
    container_name: jjho-fan-almanac
    restart: unless-stopped
    environment:
      APP_PASSWORD: ${APP_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      APP_HOST: jjho.graham-williams.com
      APP_ENV: prod
      JJHO_DATA: /app/data
    volumes:
      - jjho-data:/app/data
    networks:
      - km-tracker_default
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jjho-data:

networks:
  km-tracker_default:
    external: true
